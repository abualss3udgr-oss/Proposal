<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Price Proposal | مولد عروض الأسعار التفاعلي</title>
<!-- استدعاء خط Cairo ومكتبة توليد الـ PDF والأيقونات -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family: 'Cairo', sans-serif;}
body{background-color: #0f0e0d; padding: 30px 20px; color: #f3efe9;}
.wrap{padding:2.5rem; max-width:850px; margin: 0 auto; background: #1c1a18; border-radius: 20px; box-shadow: 0 15px 50px rgba(0,0,0,0.6); border: 1px solid rgba(216,90,48,0.15); position: relative;}

/* المظهر العام والتبديل بين اللغات */
.header-area{display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; border-bottom: 1px solid #2c2925; padding-bottom: 1.5rem;}
.main-title{font-size: 26px; font-weight: 800; color: #ffffff;}
.main-title span{color: #D85A30;}
.btn-lang{padding: 8px 18px; font-size: 13px; font-weight: 700; border: 1px solid #3c3734; background: #2c2925; border-radius: 20px; cursor: pointer; transition: all 0.2s; color: #f3efe9; display: inline-flex; align-items: center; gap: 6px;}
.btn-lang:hover{background: #fdf5f2; border-color: #D85A30; color: #D85A30;}

/* الحقول والتنسيق الشبكي */
.section-title{font-size: 15px; font-weight: 700; color: #D85A30; text-transform: uppercase; letter-spacing: .05em; margin: 1.5rem 0 1rem 0; display: flex; align-items: center; gap: 8px;}
.row3{display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px;}
.row2{display: grid; grid-template-columns: 1fr 1fr; gap: 15px;}
@media (max-width: 650px) { .row3, .row2 { grid-template-columns: 1fr; } }

.field{margin-bottom: 1.25rem;}
.field label{display: block; font-size: 13px; font-weight: 600; color: #e8e4df; margin-bottom: 8px;}
.field input, .field textarea, .field select{width: 100%; padding: 11px 14px; border: 1px solid #3c3734; border-radius: 8px; font-size: 14px; color: #ffffff; background: #2c2925; transition: all .2s;}
.field input:focus, .field textarea:focus, .field select:focus{outline: none; border-color: #D85A30; box-shadow: 0 0 0 3px rgba(216,90,48,.25);}

/* جدول العناصر والخدمات الديناميكي */
.items-table{width: 100%; border-collapse: collapse; margin-top: 0.5rem; margin-bottom: 1rem;}
.items-table th{background: #2c2925; color: #e8e4df; font-size: 13px; font-weight: 700; padding: 12px; text-align: start; border-radius: 4px;}
.items-table td{padding: 10px 4px; vertical-align: top;}
.btn-del{background: #3a1d1d; border: 1px solid #5c2323; color: #e03131; padding: 10px; border-radius: 8px; cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center;}
.btn-del:hover{background: #e03131; color: #fff;}

.btn-add{background: transparent; border: 1px dashed #D85A30; color: #D85A30; padding: 10px 20px; font-size: 13px; font-weight: 600; border-radius: 8px; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; transition: all 0.2s; margin-bottom: 1.5rem;}
.btn-add:hover{background: rgba(216,90,48,0.1); transform: translateY(-1px);}

/* الحسابات والملخص */
.calc-wrapper{display: flex; justify-content: flex-end; margin-top: 1rem; border-top: 1px solid #2c2925; padding-top: 1.5rem;}
.calc-box{width: 300px;}
@media (max-width: 500px) { .calc-wrapper { justify-content: fill; } .calc-box { width: 100%; } }
.calc-row{display: flex; justify-content: space-between; font-size: 14px; color: #bcbab6; margin-bottom: 10px;}
.calc-row.total{font-size: 18px; font-weight: 700; color: #ffffff; border-top: 1px dashed #3c3734; padding-top: 10px; margin-top: 10px;}
.calc-row.total span:last-child{color: #D85A30;}

/* أزرار التحكم السفلى */
.actions-bar{display: flex; justify-content: space-between; margin-top: 2.5rem; border-top: 1px solid #2c2925; padding-top: 1.5rem;}
.btn{padding: 12px 26px; border-radius: 8px; font-size: 14px; font-weight: 700; cursor: pointer; border: 1px solid #3c3734; background: #2c2925; color: #e8e4df; transition: all .2s; display: inline-flex; align-items: center; gap: 8px;}
.btn:hover{background: #3c3734; border-color: #5c5651;}
.btn.primary{background: #D85A30; border-color: #D85A30; color: #fff;}
.btn.primary:hover{background: #ff7643; border-color: #ff7643; box-shadow: 0 4px 15px rgba(216,90,48,0.3);}

/* تصميم وتنسيق الـ PDF عند التصدير للطباعة (خلفية بيضاء رسمية بالكامل) */
#proposal-pdf { display: none; background: #ffffff; color: #1c1a18; padding: 40px; font-family: 'Cairo', sans-serif; }
.pdf-top{display: flex; justify-content: space-between; border-bottom: 3px solid #D85A30; padding-bottom: 20px; margin-bottom: 25px;}
.pdf-top h2{font-size: 26px; font-weight: 800; color: #1c1a18;}
.pdf-meta-grid{display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-bottom: 30px;}
.pdf-meta-box h4{font-size: 13px; color: #D85A30; border-bottom: 1px solid #dcd7d2; padding-bottom: 4px; margin-bottom: 8px; text-transform: uppercase;}
.pdf-meta-line{font-size: 13px; margin-bottom: 5px; color: #3c3734;}
.pdf-meta-line strong{color: #1c1a18;}
.pdf-table{width: 100%; border-collapse: collapse; margin: 25px 0;}
.pdf-table th{background: #fcfbfa; color: #1c1a18; font-weight: 700; font-size: 13px; padding: 12px; border-bottom: 2px solid #bcbab6; text-align: start;}
.pdf-table td{padding: 12px; border-bottom: 1px solid #f3efe9; font-size: 13px; color: #3c3734;}
.pdf-calc-box{float: left; width: 280px; margin-top: 15px;}
html[dir="rtl"] .pdf-calc-box{float: right;}
.pdf-calc-row{display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 8px; color: #5c5651;}
.pdf-calc-row.grand{font-size: 16px; font-weight: 700; color: #1c1a18; border-top: 1px solid #bcbab6; padding-top: 8px; margin-top: 8px;}
.pdf-footer{margin-top: 100px; border-top: 1px dashed #dcd7d2; padding-top: 15px; text-align: center; font-size: 11px; color: #8c857f;}
</style>
</head>
<body>

<div class="wrap">
  <div class="header-area">
    <div class="main-title" id="page-title" data-en="Price <span>Proposal</span>">عرض <span>سعر</span></div>
    <button class="btn-lang" onclick="toggleLanguage()" id="lang-btn"><i class="ti ti-language"></i> English</button>
  </div>

  <!-- القسم الأول: بيانات العرض الأساسية -->
  <div class="section-title"><i class="ti ti-file-description"></i> <span data-en="Proposal Details">تفاصيل الهوية والعرض</span></div>
  <div class="row3">
    <div class="field">
      <label data-en="Proposal Number">رقم عرض السعر</label>
      <input type="text" id="prop-num" value="PROP-2026-001" />
    </div>
    <div class="field">
      <label data-en="Issue Date">تاريخ الإصدار</label>
      <input type="date" id="prop-date" />
    </div>
    <div class="field">
      <label data-en="Expiry Date">صالح حتى تاريخ</label>
      <input type="date" id="prop-expiry" />
    </div>
  </div>

  <div class="row2">
    <!-- القسم الثاني: بيانات مقدم الخدمة (أنت) -->
    <div>
      <div class="section-title"><i class="ti ti-user-check"></i> <span data-en="From (Service Provider)">صادر من (مقدم الخدمة)</span></div>
      <div class="field">
        <input type="text" id="from-name" placeholder="اسمك التجاري أو الشخصي" data-placeholder-en="Your Name / Brand"/>
      </div>
      <div class="field">
        <input type="text" id="from-contact" placeholder="الهاتف أو البريد الإلكتروني" data-placeholder-en="Phone or Email"/>
      </div>
    </div>
    <!-- القسم الثالث: بيانات العميل -->
    <div>
      <div class="section-title"><i class="ti ti-users"></i> <span data-en="To (Client)">مقدم إلى (العميل)</span></div>
      <div class="field">
        <input type="text" id="to-name" placeholder="اسم شركة العميل / العميل الكريم" data-placeholder-en="Client / Company Name"/>
      </div>
      <div class="field">
        <input type="text" id="to-contact" placeholder="رقم التواصل أو الإيميل" data-placeholder-en="Contact Number / Email"/>
      </div>
    </div>
  </div>

  <!-- القسم الرابع: جدول بنود الخدمات والأعمال -->
  <div class="section-title"><i class="ti ti-list-check"></i> <span data-en="Scope of Work & Pricing">نطاق العمل والتسعير</span></div>
  <table class="items-table" id="items-container">
    <thead>
      <tr>
        <th style="width: 55%;" data-en="Service Description">وصف الخدمة / المخرج</th>
        <th style="width: 15%;" data-en="Qty">الكمية</th>
        <th style="width: 20%;" data-en="Unit Price">سعر الوحدة</th>
        <th style="width: 10%;"></th>
      </tr>
    </thead>
    <tbody id="items-tbody">
      <!-- الصف الأول الافتراضي -->
      <tr>
        <td><div class="field" style="margin:0;"><input type="text" class="item-desc" placeholder="مثال: تصميم هوية بصرية كاملة ودليل الاستخدام" data-placeholder-en="e.g., Full Visual Identity Design & Brand Guidelines"/></div></td>
        <td><div class="field" style="margin:0;"><input type="number" class="item-qty" value="1" oninput="calculateTotal()"/></div></td>
        <td><div class="field" style="margin:0;"><input type="number" class="item-price" placeholder="0.00" oninput="calculateTotal()"/></div></td>
        <td style="text-align: center;"><button class="btn-del" onclick="deleteRow(this)"><i class="ti ti-trash"></i></button></td>
      </tr>
    </tbody>
  </table>
  
  <button class="btn-add" onclick="addNewRow()"><i class="ti ti-plus"></i> <span data-en="Add Additional Item">إضافة بند خدمات جديد</span></button>

  <div class="row2" style="align-items: flex-start;">
    <!-- شروط وأحكام العرض -->
    <div class="field">
      <div class="section-title" style="margin-top:0;"><i class="ti ti-shield-alert"></i> <span data-en="Terms & Conditions">الشروط والأحكام</span></div>
      <textarea id="prop-terms" style="min-height: 110px;" placeholder="مثال: مدة العمل المتوقعة 15 يوم عمل من تاريخ التعميد ودفع الدفعة الأولى (50%)." data-placeholder-en="e.g., Estimated timeline is 15 business days starting from signing and receiving the 50% deposit."></textarea>
    </div>
    
    <!-- بوكس الحسابات التلقائية -->
    <div class="calc-wrapper" style="margin:0; padding:0; border:0;">
      <div class="calc-box">
        <div class="calc-row"><span data-en="Subtotal:">المجموع الفرعي:</span><span id="subtotal-val">0.00</span></div>
        <div class="calc-row" style="align-items: center;">
          <span data-en="Tax / VAT (%):">الضريبة المضافة (%):</span>
          <input type="number" id="tax-input" value="0" style="width: 60px; padding: 4px 8px; background: #2c2925; border: 1px solid #3c3734; color: #fff; border-radius: 4px; text-align: center;" oninput="calculateTotal()"/>
        </div>
        <div class="calc-row"><span data-en="Tax Amount:">قيمة الضريبة:</span><span id="tax-amount-val">0.00</span></div>
        <div class="calc-row total"><span data-en="Grand Total:">الإجمالي الكلي:</span><span id="grand-total-val">0.00</span></div>
      </div>
    </div>
  </div>

  <!-- الأزرار السفلية -->
  <div class="actions-bar">
    <button class="btn" onclick="clearAll()"><i class="ti ti-clear-all"></i> <span data-en="Clear Data">مسح البيانات</span></button>
    <button class="btn primary" onclick="exportProposalPDF()"><i class="ti ti-file-export"></i> <span data-en="Export PDF Document">تصدير وثيقة PDF</span></button>
  </div>
</div>

<!-- القالب المخفي الفاخر والأبيض المخصص لحفظ وطباعة العرض للعميل بجودة ممتازة -->
<div id="proposal-pdf"></div>

<script>
let currentLang = 'ar';

// تعيين تاريخ اليوم تلقائياً عند فتح الأداة
document.getElementById('prop-date').valueAsDate = new Date();

function toggleLanguage() {
  currentLang = currentLang === 'ar' ? 'en' : 'ar';
  const htmlEl = document.documentElement;
  const langBtn = document.getElementById('lang-btn');
  
  if (currentLang === 'en') {
    htmlEl.setAttribute('lang', 'en');
    htmlEl.setAttribute('dir', 'ltr');
    langBtn.innerHTML = '<i class="ti ti-language"></i> العربية';
  } else {
    htmlEl.setAttribute('lang', 'ar');
    htmlEl.setAttribute('dir', 'rtl');
    langBtn.innerHTML = '<i class="ti ti-language"></i> English';
  }
  
  document.querySelectorAll('[data-en]').forEach(el => {
    if (!el.dataset.ar) el.dataset.ar = el.innerHTML;
    el.innerHTML = currentLang === 'en' ? el.dataset.en : el.dataset.ar;
  });

  document.querySelectorAll('[data-placeholder-en]').forEach(el => {
    if (!el.dataset.placeholderAr) el.dataset.placeholderAr = el.placeholder;
    el.placeholder = currentLang === 'en' ? el.dataset.placeholderEn : el.dataset.placeholderAr;
  });

  calculateTotal();
}

function addNewRow() {
  const tbody = document.getElementById('items-tbody');
  const tr = document.createElement('tr');
  
  const descPlaceholder = currentLang === 'en' ? 'Service Description...' : 'وصف الخدمة أو البند الإضافي...';
  
  tr.innerHTML = `
    <td><div class="field" style="margin:0;"><input type="text" class="item-desc" placeholder="${descPlaceholder}"/></div></td>
    <td><div class="field" style="margin:0;"><input type="number" class="item-qty" value="1" oninput="calculateTotal()"/></div></td>
    <td><div class="field" style="margin:0;"><input type="number" class="item-price" placeholder="0.00" oninput="calculateTotal()"/></div></td>
    <td style="text-align: center;"><button class="btn-del" onclick="deleteRow(this)"><i class="ti ti-trash"></i></button></td>
  `;
  tbody.appendChild(tr);
}

function deleteRow(button) {
  const row = button.closest('tr');
  const tbody = document.getElementById('items-tbody');
  if(tbody.rows.length > 1) {
    row.remove();
    calculateTotal();
  }
}

let subtotalGlobal = 0;
let taxAmountGlobal = 0;
let grandTotalGlobal = 0;

function calculateTotal() {
  const tbody = document.getElementById('items-tbody');
  let subtotal = 0;
  
  for (let i = 0; i < tbody.rows.length; i++) {
    const row = tbody.rows[i];
    const qty = parseFloat(row.querySelector('.item-qty').value) || 0;
    const price = parseFloat(row.querySelector('.item-price').value) || 0;
    subtotal += (qty * price);
  }
  
  const taxPercent = parseFloat(document.getElementById('tax-input').value) || 0;
  const taxAmount = subtotal * (taxPercent / 100);
  const grandTotal = subtotal + taxAmount;
  
  subtotalGlobal = subtotal.toFixed(2);
  taxAmountGlobal = taxAmount.toFixed(2);
  grandTotalGlobal = grandTotal.toFixed(2);
  
  const currency = currentLang === 'en' ? ' SAR' : ' ريال';
  document.getElementById('subtotal-val').textContent = subtotalGlobal + currency;
  document.getElementById('tax-amount-val').textContent = taxAmountGlobal + currency;
  document.getElementById('grand-total-val').textContent = grandTotalGlobal + currency;
}

function buildPDFHTML() {
  const p = document.getElementById('proposal-pdf');
  
  const labels = {
    propTitle: currentLang === 'en' ? 'PRICE PROPOSAL' : 'عرض سعر مالي',
    fromSec: currentLang === 'en' ? 'From (Service Provider):' : 'من (مقدم الخدمة):',
    toSec: currentLang === 'en' ? 'Prepared For (Client):' : 'مُعد خصيصاً لـ (العميل):',
    propNo: currentLang === 'en' ? 'Proposal No:' : 'رقم العرض:',
    date: currentLang === 'en' ? 'Issue Date:' : 'تاريخ الإصدار:',
    expiry: currentLang === 'en' ? 'Valid Until:' : 'صالح حتى:',
    thDesc: currentLang === 'en' ? 'Service Description' : 'وصف الخدمة / بند الأعمال',
    thQty: currentLang === 'en' ? 'Qty' : 'الكمية',
    thPrice: currentLang === 'en' ? 'Unit Price' : 'سعر الوحدة',
    thTotal: currentLang === 'en' ? 'Total' : 'المجموع',
    sub: currentLang === 'en' ? 'Subtotal:' : 'المجموع الفرعي:',
    tax: currentLang === 'en' ? `VAT (${document.getElementById('tax-input').value}%):` : `ضريبة القيمة المضافة (${document.getElementById('tax-input').value}%):`,
    grand: currentLang === 'en' ? 'Grand Total:' : 'الإجمالي المستحق:',
    terms: currentLang === 'en' ? 'Terms & Execution Conditions:' : 'شروط التنفيذ والأحكام العامة:',
    footer: currentLang === 'en' ? 'Thank you for your trust. We look forward to a successful collaboration.' : 'نشكركم على ثقتكم الغالية، ونتطلع لبناء شراكة عمل ناجحة ومثمرة.'
  };

  const currency = currentLang === 'en' ? ' SAR' : ' ريال';
  
  // تجميع صفوف الخدمات لملف الـ PDF
  let tableRowsHTML = '';
  const tbody = document.getElementById('items-tbody');
  for (let i = 0; i < tbody.rows.length; i++) {
    const row = tbody.rows[i];
    const desc = row.querySelector('.item-desc').value || '—';
    const qty = parseFloat(row.querySelector('.item-qty').value) || 0;
    const price = parseFloat(row.querySelector('.item-price').value) || 0;
    const totalRow = (qty * price).toFixed(2);
    
    tableRowsHTML += `
      <tr>
        <td style="font-weight: 600;">${desc}</td>
        <td style="text-align: center;">${qty}</td>
        <td>${price.toFixed(2)} ${currency}</td>
        <td style="font-weight: 700; text-align: end;">${totalRow} ${currency}</td>
      </tr>
    `;
  }

  const termsValue = document.getElementById('prop-terms').value.trim().replace(/\n/g, '<br>') || '—';

  p.innerHTML = `
    <div class="pdf-top" dir="${currentLang === 'ar' ? 'rtl' : 'ltr'}">
      <div>
        <h2>${labels.propTitle}</h2>
        <p style="font-size:13px; color:#5c5651; margin-top:5px;">${labels.propNo} <strong>${document.getElementById('prop-num').value}</strong></p>
      </div>
      <div style="text-align: end; font-size:13px; color:#3c3734;">
        <div>${labels.date} <strong>${document.getElementById('prop-date').value}</strong></div>
        <div style="margin-top:4px;">${labels.expiry} <strong>${document.getElementById('prop-expiry').value || '—'}</strong></div>
      </div>
    </div>

    <div class="pdf-meta-grid" dir="${currentLang === 'ar' ? 'rtl' : 'ltr'}">
      <div class="pdf-meta-box">
        <h4>${labels.fromSec}</h4>
        <div class="pdf-meta-line" style="font-size:15px; font-weight:700; color:#1c1a18;">${document.getElementById('from-name').value || '—'}</div>
        <div class="pdf-meta-line">${document.getElementById('from-contact').value || '—'}</div>
      </div>
      <div class="pdf-meta-box">
        <h4>${labels.toSec}</h4>
        <div class="pdf-meta-line" style="font-size:15px; font-weight:700; color:#1c1a18;">${document.getElementById('to-name').value || '—'}</div>
        <div class="pdf-meta-line">${document.getElementById('to-contact').value || '—'}</div>
      </div>
    </div>

    <table class="pdf-table" dir="${currentLang === 'ar' ? 'rtl' : 'ltr'}">
      <thead>
        <tr>
          <th style="width: 50%;">${labels.thDesc}</th>
          <th style="width: 10%; text-align: center;">${labels.thQty}</th>
          <th style="width: 20%;">${labels.thPrice}</th>
          <th style="width: 20%; text-align: end;">${labels.thTotal}</th>
        </tr>
      </thead>
      <tbody>
        ${tableRowsHTML}
      </tbody>
    </table>

    <div style="width: 100%; overflow: hidden; margin-top: 20px;" dir="${currentLang === 'ar' ? 'rtl' : 'ltr'}">
      <div class="pdf-calc-box">
        <div class="pdf-calc-row"><span>${labels.sub}</span><span>${subtotalGlobal} ${currency}</span></div>
        <div class="pdf-calc-row"><span>${labels.tax}</span><span>${taxAmountGlobal} ${currency}</span></div>
        <div class="pdf-calc-row grand"><span>${labels.grand}</span><span>${grandTotalGlobal} ${currency}</span></div>
      </div>
    </div>

    <div style="margin-top: 40px; background: #fcfbfa; padding: 20px; border-radius: 8px; border: 1px solid #f3efe9;" dir="${currentLang === 'ar' ? 'rtl' : 'ltr'}">
      <h4 style="font-size: 13px; color: #D85A30; margin-bottom: 8px; font-weight: 700;">${labels.terms}</h4>
      <p style="font-size: 12px; color: #5c5651; line-height: 1.6;">${termsValue}</p>
    </div>

    <div class="pdf-footer">${labels.footer}</div>
  `;
}

function exportProposalPDF() {
  calculateTotal();
  buildPDFHTML();
  
  const element = document.getElementById('proposal-pdf');
  element.style.display = 'block'; 
  
  const clientName = document.getElementById('to-name').value.trim() || 'Client';
  const opt = {
    margin:       15,
    filename:     `Price-Proposal-${clientName}.pdf`,
    image:        { type: 'jpeg', quality: 0.98 },
    html2canvas:  { scale: 2, useCORS: true },
    jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
  };

  html2pdf().set(opt).from(element).save().then(() => {
    element.style.display = 'none'; 
  });
}

function clearAll() {
  ['from-name', 'from-contact', 'to-name', 'to-contact', 'prop-expiry', 'prop-terms'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('tax-input').value = '0';
  document.getElementById('items-tbody').innerHTML = `
    <tr>
      <td><div class="field" style="margin:0;"><input type="text" class="item-desc" placeholder="${currentLang === 'en' ? 'e.g., Full Visual Identity Design' : 'مثال: تصميم هوية بصرية كاملة ودليل الاستخدام'}"/></div></td>
      <td><div class="field" style="margin:0;"><input type="number" class="item-qty" value="1" oninput="calculateTotal()"/></div></td>
      <td><div class="field" style="margin:0;"><input type="number" class="item-price" placeholder="0.00" oninput="calculateTotal()"/></div></td>
      <td style="text-align: center;"><button class="btn-del" onclick="deleteRow(this)"><i class="ti ti-trash"></i></button></td>
    </tr>
  `;
  calculateTotal();
}
</script>
</body>
</html>
